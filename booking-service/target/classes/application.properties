server.port=8083
spring.application.name=booking-service

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5434/bookingdb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:bookinguser}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:bookingpass}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.group-id=booking-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*

flight.service.url=${FLIGHT_SERVICE_URL:http://localhost:8082}

management.endpoints.web.exposure.include=health,info
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

management.endpoint.health.show-details=always
management.health.db.enabled=true
management.health.kafka.enabled=true

# Disable type headers so all services can deserialize each other's events
spring.kafka.producer.properties.spring.json.add.type.headers=false