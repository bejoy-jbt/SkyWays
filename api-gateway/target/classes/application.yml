server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
      routes:
        - id: auth-service
          uri: http://auth-service:8081
          predicates: [Path=/api/auth/**]
          filters: [StripPrefix=0]

        - id: flight-service
          uri: http://flight-service:8082
          predicates: [Path=/api/flights/**]
          filters:
            - StripPrefix=0
            - name: JwtAuthFilter

        - id: booking-service
          uri: http://booking-service:8083
          predicates: [Path=/api/bookings/**]
          filters:
            - StripPrefix=0
            - name: JwtAuthFilter

        - id: payment-service
          uri: http://payment-service:8084
          predicates: [Path=/api/payments/**]
          filters:
            - StripPrefix=0
            - name: JwtAuthFilter

        - id: admin-routes
          uri: http://flight-service:8082
          predicates: [Path=/api/admin/**]
          filters:
            - StripPrefix=0
            - name: JwtAuthFilter


jwt:
  secret: ${JWT_SECRET:SuperSecretKey256BitsLongForHS256AlgorithmUsage}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
