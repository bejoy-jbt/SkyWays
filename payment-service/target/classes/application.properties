server.port=8084
spring.application.name=payment-service

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5435/paymentdb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:paymentuser}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:paymentpass}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.group-id=payment-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*

stripe.secret.key=${STRIPE_SECRET_KEY:sk_test_placeholder}

management.endpoints.web.exposure.include=health,info
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

management.endpoint.health.show-details=always
management.health.db.enabled=true
management.health.kafka.enabled=true

# Disable type headers so all services can deserialize each other's events
spring.kafka.producer.properties.spring.json.add.type.headers=false